version: "3.8"

services:
  manager:
    image: halyard-manager:latest
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - halyard_data:/data
    deploy:
      placement:
        constraints:
          - node.role == manager

  agent:
    image: halyard-agent:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      mode: global

volumes:
  halyard_data:
